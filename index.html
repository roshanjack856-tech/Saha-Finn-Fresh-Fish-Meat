<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saha Finn - Fresh Fish & Meat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Unbounded', sans-serif;
}
body{
background:#fafafa;
color:#222;
}
a{
text-decoration:none;
}
p{
font-weight:300;
}
img{
width:100%;
display:block;
}
.container{
width:90%;
max-width:1200px;
margin:auto;
}
/* Display font for headings / logo */
.logo,
.hero h1,
.title h2,
.story h2,
.card h3,
.feature h3,
footer h3{
font-family:'Clash Display', 'Poppins', sans-serif;
}
/* Navbar */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:transparent;
box-shadow:none;
z-index:999;
transition:background .35s ease, box-shadow .35s ease;
}
header.scrolled{
background:#fff;
box-shadow:0 3px 15px rgba(0,0,0,.08);
}
nav{
height:86px;
display:flex;
justify-content:space-between;
align-items:center;
gap:24px;
}
.logo{
font-size:30px;
font-weight:700;
color:#fff;
transition:color .3s ease;
white-space:nowrap;
}
header.scrolled .logo{
color:#0E9F6E;
}
.logo span{
color:#ff5a1f;
}
nav ul{
display:flex;
gap:32px;
list-style:none;
}
nav ul li a{
color:#fff;
font-weight:600;
font-size:14px;
letter-spacing:.03em;
text-transform:uppercase;
transition:.3s;
}
header.scrolled nav ul li a{
color:#333;
}
nav ul li a:hover{
color:#ff5a1f;
}
.nav-right{
display:flex;
align-items:center;
gap:22px;
}
.call-info{
display:flex;
align-items:center;
gap:8px;
color:#fff;
font-size:13.5px;
font-weight:600;
letter-spacing:.02em;
white-space:nowrap;
transition:color .3s ease;
}
.call-info b{
font-weight:800;
}
header.scrolled .call-info{
color:#333;
}
.btn{
background:#e63946;
color:#fff;
padding:12px 25px;
border-radius:40px;
font-weight:600;
white-space:nowrap;
transition:background .3s ease;
}
.btn:hover{
background:#c92a37;
}
/* Hero */
.hero{
height:100vh;
display:flex;
align-items:center;
position:relative;
overflow:hidden;
}
.hero-slides{
position:absolute;
inset:0;
z-index:0;
}
.hero-slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
transition:opacity 1.4s ease;
}
.hero-slide.active{
opacity:1;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(100deg, rgba(0,0,0,.72) 30%, rgba(0,0,0,.4) 100%);
z-index:1;
}
.hero-content{
position:relative;
z-index:2;
color:#fff;
max-width:650px;
}
.hero-eyebrow{
display:inline-block;
font-size:13px;
font-weight:700;
letter-spacing:.2em;
text-transform:uppercase;
color:#ff5a1f;
margin-bottom:18px;
}
.hero h1{
font-size:58px;
line-height:1.2;
margin-bottom:20px;
font-weight:600;
}
.hero p{
font-size:18px;
margin-bottom:35px;
line-height:1.8;
color:#e6e6e6;
}
.hero-btn{
display:inline-block;
padding:15px 34px;
background:#e63946;
color:#fff;
font-weight:600;
border-radius:8px;
transition:background .3s ease, transform .3s ease;
}
.hero-btn:hover{
background:#c92a37;
transform:translateY(-2px);
}
.hero-dots{
position:absolute;
right:36px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:14px;
z-index:3;
}
.hero-dots .dot{
width:11px;
height:11px;
border-radius:50%;
background:rgba(255,255,255,.35);
cursor:pointer;
transition:background .3s ease, transform .3s ease;
border:none;
padding:0;
}
.hero-dots .dot.active{
background:#fff;
transform:scale(1.25);
}
@media(max-width:900px){
.hero-dots{display:none;}
}
/* Categories */
.section{
padding:90px 0;
}
.title{
text-align:center;
margin-bottom:50px;
}
.title h2{
font-size:40px;
margin-bottom:10px;
font-weight:600;
}
.title p{
color:#777;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}
.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.4s;
}
.card:hover{
transform:translateY(-8px);
}
.card img{
height:220px;
object-fit:cover;
}
.card-content{
padding:25px;
}
.card h3{
margin-bottom:10px;
font-weight:600;
}
.card p{
color:#666;
line-height:1.6;
}
/* Story */
.story{
background:#fff;
}
.story-box{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}
.story h2{
font-size:42px;
margin-bottom:20px;
font-weight:600;
}
.story p{
line-height:2;
color:#666;
margin-bottom:20px;
}
.story img{
border-radius:20px;
}
/* Features */
.features{
background:#0E9F6E;
color:#fff;
}
.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}
.feature{
text-align:center;
padding:30px;
}
.feature h3{
margin:15px 0;
font-weight:600;
}
/* Footer */
footer{
background:#111;
color:#ccc;
padding:60px 0;
text-align:center;
}
footer h3{
color:#fff;
font-size:28px;
margin-bottom:15px;
font-weight:600;
}
footer p{
margin:10px 0;
}
@media(max-width:768px){
nav ul{
display:none;
}
.call-info{
display:none;
}
.hero h1{
font-size:36px;
}
.hero-eyebrow{
font-size:12px;
}
.story-box{
grid-template-columns:1fr;
}
}
@media (max-width:900px){nav ul{display:none;}}
/* ---------- mobile hamburger + slide-in menu ---------- */
.menu-toggle{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:42px;height:42px;background:transparent;border:none;cursor:pointer;z-index:1002;position:relative;}
.menu-toggle span{width:24px;height:2px;background:#fff;border-radius:2px;transition:transform .32s cubic-bezier(.16,1,.3,1),opacity .25s ease,background .3s ease;}
header.scrolled .menu-toggle span{background:#222;}
.menu-toggle.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.menu-toggle.active span:nth-child(2){opacity:0;}
.menu-toggle.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-nav-overlay{position:fixed;inset:0;background:rgba(4,10,12,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .35s ease;z-index:1000;}
.mobile-nav-overlay.active{opacity:1;visibility:visible;}
.mobile-nav-panel{position:fixed;top:0;right:0;height:100vh;height:100dvh;width:84%;max-width:340px;background:radial-gradient(circle at 88% 6%, rgba(46,139,139,.55), transparent 40%),radial-gradient(circle at 105% 60%, rgba(232,101,76,.5), transparent 45%),radial-gradient(circle at -5% 100%, rgba(217,164,65,.32), transparent 48%),linear-gradient(165deg, rgba(9,22,26,.95) 0%, rgba(6,15,18,.97) 100%);backdrop-filter:blur(26px) saturate(150%);-webkit-backdrop-filter:blur(26px) saturate(150%);border-left:1px solid rgba(255,255,255,.08);z-index:1001;box-shadow:-20px 0 60px rgba(0,0,0,.5);transform:translateX(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;padding:20px 20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;box-sizing:border-box;font-family:'Poppins','Work Sans',sans-serif;}
  if(!toggle||!overlay||!panel) return;
  function closeMenu(){
    toggle.classList.remove('active');
    overlay.classList.remove('active');
    panel.classList.remove('active');
    document.body.classList.remove('nav-open');
  }
  function openMenu(){
    toggle.classList.add('active');
    overlay.classList.add('active');
    panel.classList.add('active');
    document.body.classList.add('nav-open');
</body>
</html>
